<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>russia-catchall 도움말 UI 미리보기</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f1e9;color:#15243d;font-family:Arial,"Malgun Gothic",sans-serif}.box{max-width:560px;margin:20px;padding:26px;background:#faf8f2;border:1px solid #d9d2c2;border-radius:16px;text-align:center;box-shadow:0 8px 24px rgba(21,36,61,.1)}.spin{width:28px;height:28px;margin:0 auto 15px;border:3px solid #d9d2c2;border-top-color:#9a6a32;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.err{color:#9c2b25;font-weight:700}
</style>
</head>
<body>
<div class="box"><div class="spin"></div><div id="status">수정된 미리보기 화면을 불러오는 중입니다…</div></div>
<script>
(async function(){
  const status=document.getElementById('status');
  try{
    const res=await fetch('./russia-catchall-help-preview-v2.html?v='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    let html=await res.text();
    const oldLine="  src=src.replace('</body>',modalHtml+scriptTag+'</body>');";
    const newLines="  const bodyClose=src.lastIndexOf('</body>');\n  if(bodyClose>=0) src=src.slice(0,bodyClose)+modalHtml+scriptTag+src.slice(bodyClose);\n  else src+=modalHtml+scriptTag;";
    if(!html.includes(oldLine))throw new Error('수정 대상 코드를 찾지 못했습니다.');
    html=html.replace(oldLine,newLines);
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.querySelector('.spin').style.display='none';
    status.className='err';
    status.textContent='미리보기를 불러오지 못했습니다: '+e.message;
  }
})();
</script>
</body>
</html>
