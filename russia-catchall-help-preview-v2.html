<div class="loader"><div class="loader-card"><div class="spin"></div><h1>확인용 화면을 준비하고 있습니다</h1><p>GitHub의 최신 <b>russia-catchall</b> 화면을 불러온 뒤 FAQ, 용어 설명, 처음이신가요 패널을 추가합니다.</p><p id="load-status">원본 HTML 불러오는 중…</p></div></div>
<script>
(async function(){
  const status=document.getElementById('load-status');
  const sources=[
    {url:'https://raw.githubusercontent.com/jinhsong/russia-catchall/main/index.html',base:'https://raw.githubusercontent.com/jinhsong/russia-catchall/main/'},
    {url:'https://cdn.jsdelivr.net/gh/jinhsong/russia-catchall@main/index.html',base:'https://cdn.jsdelivr.net/gh/jinhsong/russia-catchall@main/'}
  ];
  let src='',base='';
  for(const item of sources){
    try{
      const res=await fetch(item.url,{cache:'no-store'});
      if(!res.ok)throw new Error('HTTP '+res.status);
      src=await res.text();base=item.base;break;
    }catch(e){}
  }
  if(!src){
    status.className='error';
    status.textContent='원본 HTML을 불러오지 못했습니다. 인터넷 연결을 확인한 뒤 다시 열어주세요.';
    document.querySelector('.spin').style.display='none';
    return;
  }

    ['3단계','판정 신청 품의에는 어떤 정보를 입력하나요?','수입국, 최종사용자, 제품명, HS코드, 사양 및 규격, 무게, 용도 등을 입력합니다. 생성된 품의 초안과 결과 요약, 사양서를 함께 검토합니다.'],
    ['4단계','허가예외 해당 없음이면 어떻게 하나요?','허가예외를 적용하기 어려운 건으로 분류되므로 결과 요약을 내려받아 통상그룹에 상황허가 등 후속 검토를 요청합니다.'],
    ['4단계','소비자 통신제품 허가예외를 선택하면 어떤 서류가 필요한가요?','현재 화면 안내에 따라 사전신고 시 6개월 이내 출시 확약서 등 해당 예외조건을 입증하는 서류를 준비합니다.'],
    ['4단계','의료기기 거래는 어떤 추가 증빙이 필요한가요?','설치확인서와 반기별 이행점검보고서 등 최종사용자와 사용용도를 확인할 수 있는 사후 증빙이 요구될 수 있으므로 화면 안내와 담당부서 지침을 확인합니다.'],
    ['5단계','사전신고에는 어떤 거래정보가 필요한가요?','인보이스 번호, 목적국, 구매자, 최종수하인, 최종사용자, 최종사용용도, 모델·품목, 수량, 단가, 유무상 여부를 입력합니다.'],
    ['5단계','SERC와 SRR을 동시에 선택할 수 있나요?','현재 사전신고 화면은 인보이스별로 SERC 또는 SRR 중 하나를 선택하도록 구성되어 있습니다. 실제 거래자가 둘 이상이면 인보이스와 거래 구조를 다시 확인합니다.'],
    ['5단계','러시아와 벨라루스를 동시에 진행하면 어떻게 하나요?','목적국과 거래자 정보가 다르므로 인보이스를 구분하고 각 국가의 구매자·최종수하인·최종사용자 정보를 별도로 입력하는 방식이 안전합니다.'],
    ['5단계','구매자·최종수하인·최종사용자가 서로 다르면 어떻게 하나요?','각 역할의 실제 법인명을 개별 입력합니다. 셋 중 하나라도 SERC 또는 SRR이 아닌 경우 의심징후 점검으로 이어질 수 있습니다.'],
    ['6단계','의심징후는 기본값이 있나요?','자동으로 안전하다고 간주하지 않습니다. 실제 거래정보를 바탕으로 각 항목을 확인하고 결과를 저장해야 합니다.'],
    ['6단계','No Matching List Found가 나오면 어떻게 체크하나요?','Tcode ZRMDD000940에서 거래자 검색 결과가 No Matching List Found로 확인되었다면 우려거래자 매칭 항목은 비해당으로 기록할 수 있습니다. 검색 대상과 철자를 다시 확인하세요.'],
    ['6단계','의심징후가 하나라도 있으면 어떻게 하나요?','자가 판단으로 종결하지 말고 거래자료와 결과 요약을 통상그룹에 전달하여 상황허가 필요 여부를 추가 검토합니다.'],
    ['7단계','결과 요약 파일은 어디에 사용하나요?','입력·판정·검토 경로를 정리한 내부 증빙으로 품의 또는 통상그룹 검토 요청에 첨부합니다. 결과 요약 자체가 허가서나 최종 승인서는 아닙니다.']
  ];
  const GLOSSARY={
    '상황허가': '전략물자가 아니더라도 대량파괴무기 등의 용도로 전용될 우려가 있거나 별도 통제요건에 해당할 때 검토하는 수출허가입니다.',
    '캐치올 통제': '품목 목록에만 의존하지 않고 최종용도·최종사용자·거래 정황을 함께 보고 통제하는 방식입니다.',
    '자가판정': '수출자가 품목의 통제대상 해당 여부를 자체적으로 확인해 등록한 판정입니다.',
    '전문판정': '전문 판정기관에 품목의 통제대상 여부를 의뢰하여 받은 판정입니다.',
    '판정정보 없음': '입력한 모델과 일치하는 판정 이력을 현재 DB에서 찾지 못한 상태입니다.',
    '판정 만료': '기존 판정의 유효기간이 지나 재판정 검토가 필요한 상태입니다.',
    '판정결과 해당': '해당 품목이 점검 대상 기준에 포함된다는 판정으로, 허가예외 등 후속 절차가 필요합니다.',
    '판정결과 비해당': '해당 판정기준에는 포함되지 않았다는 뜻이며, 거래 의심징후 검토가 면제된다는 의미는 아닙니다.',
    '판정번호': '자가판정 또는 전문판정 결과를 식별하는 번호입니다.',
    'HS코드': '국제적으로 거래되는 물품을 분류하는 품목번호입니다. 이 화면의 판정 신청 단계에서는 한국 수출기준 10자리 코드를 사용합니다.',
    '사전신고 대상 HS': '허가예외 적용 시 수출 전에 신고가 필요한 품목 범위를 판별하기 위해 사용하는 HS 목록입니다.',
    '허가예외': '정해진 요건을 모두 충족하는 경우 개별 상황허가 없이 수출할 수 있도록 한 예외 절차입니다. 조건과 신고·사후관리 의무를 함께 확인해야 합니다.',
    '사전신고': '허가예외 거래 중 신고 대상에 대해 수출 전에 품목·거래자·금액·용도 등을 제출하는 절차입니다.',
    '구매자': '수출자와 계약을 체결하거나 대금을 지급하는 거래 상대방입니다.',
    '최종수하인': '수출 물품을 최종적으로 인도받는 법인 또는 기관입니다. 실제 사용자와 다를 수 있습니다.',
    '최종사용자': '수출된 물품을 실제로 사용하는 법인·기관 또는 부서입니다.',
    '최종사용용도': '수출 물품이 실제로 사용되는 목적과 업무입니다.',
    'SERC': '이 화면에서 러시아 소재 관계 법인 거래자를 구분하기 위해 사용하는 약칭입니다. 실제 법인명과 역할을 거래서류에서 확인해야 합니다.',
    'SRR': '이 화면에서 러시아 소재 연구소 거래자를 구분하기 위해 사용하는 약칭입니다. 실제 법인명과 역할을 거래서류에서 확인해야 합니다.',
    '우려거래자': '제재·수출통제·확산 위험 등의 사유로 거래 전 추가 확인이 필요한 개인 또는 법인입니다.',
    '의심징후': '최종용도 불명확, 비정상적인 가격·운송경로, 정보제공 기피 등 상황허가 위험을 시사하는 거래 정황입니다.',
    '대러 제재대상 HS': '러시아 관련 별도 통제 또는 제재 검토를 위해 관리하는 HS 품목 목록입니다.',
    '설치확인서': '수출된 장비가 신고한 장소와 사용자에게 설치되었음을 확인하는 사후 증빙입니다.',
    '이행점검보고서': '허가 또는 예외조건에 따라 최종사용과 준수상태를 일정 주기로 확인해 제출하는 자료입니다.',
    '결과 요약': '사용자가 입력한 모델, 판정상태, 예외·사전신고·의심징후 점검 결과를 정리한 내부 검토자료입니다.'
  };
  const q=s=>document.querySelector(s),qa=s=>Array.from(document.querySelectorAll(s));

  /* 모델 카드 UI는 기존 #models textarea와 동기화하여 원래 판정 로직을 그대로 사용합니다. */
  let modelRows=[];
  function uniqueModels(values){const seen=new Set();return values.map(v=>String(v||'').trim()).filter(v=>v&&!seen.has(v.toLowerCase())&&seen.add(v.toLowerCase()))}
  function sourceModels(){return uniqueModels(String(q('#models')?.value||'').split(/[\n,]/))}
  function syncModelSource(){const hidden=q('#models');if(!hidden)return;hidden.value=uniqueModels(modelRows.map(r=>r.value)).join('\n');hidden.dispatchEvent(new Event('input',{bubbles:true}))}
  function escapeModelHtml(value){return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
  function renderModelRows(focusIndex){
    const list=q('#model-item-list');if(!list)return;
    if(!modelRows.length)modelRows=[{id:Date.now()+'-0',value:''}];
    list.innerHTML=modelRows.map(function(row,i){
      return '<div class="model-item-card">'
        +'<div class="model-item-head"><div class="model-item-title"><span class="model-item-num">'+(i+1)+'</span>검토 모델 '+(i+1)+'</div>'
        +'<button class="btn sm model-delete" type="button" data-model-delete="'+row.id+'" '+(modelRows.length===1?'disabled':'')+'>삭제</button></div>'
        +'<label class="fld req" for="model-row-'+row.id+'">모델명</label>'
        +'<input class="model-card-input" id="model-row-'+row.id+'" data-model-id="'+row.id+'" type="text" value="'+escapeModelHtml(row.value)+'" placeholder="예: SM-S928N" autocomplete="off">'
        +'<div class="model-item-note">모델명은 판정 DB에 등록된 표기와 동일하게 입력하는 것이 가장 정확합니다.</div></div>';
    }).join('');
    qa('[data-model-id]').forEach(input=>input.addEventListener('input',()=>{const row=modelRows.find(x=>x.id===input.dataset.modelId);if(row)row.value=input.value;syncModelSource()}));
    qa('[data-model-delete]').forEach(btn=>btn.addEventListener('click',()=>{modelRows=modelRows.filter(x=>x.id!==btn.dataset.modelDelete);syncModelSource();renderModelRows()}));
    if(Number.isInteger(focusIndex))setTimeout(()=>qa('[data-model-id]')[focusIndex]?.focus(),0);
  }
  function initModelRows(){const existing=sourceModels();modelRows=(existing.length?existing:['']).map((value,i)=>({id:Date.now()+'-'+i+'-'+Math.random().toString(36).slice(2,7),value}));renderModelRows()}
  q('#model-add')?.addEventListener('click',()=>{syncModelSource();modelRows.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,7),value:''});renderModelRows(modelRows.length-1)});
  q('#model-bulk-apply')?.addEventListener('click',()=>{const values=uniqueModels(String(q('#model-bulk-input')?.value||'').split(/\r?\n|,/));if(!values.length){alert('반영할 모델명을 1개 이상 입력하세요.');return}modelRows=values.map((value,i)=>({id:Date.now()+'-'+i+'-'+Math.random().toString(36).slice(2,7),value}));syncModelSource();renderModelRows();q('#model-item-list')?.scrollIntoView({behavior:'smooth',block:'nearest'})});
  initModelRows();

  function openModal(id){const el=q(id);if(!el)return;el.classList.add('open');el.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';setTimeout(()=>el.querySelector('input')?.focus(),30)}
  function closeModal(el){if(!el)return;el.classList.remove('open');el.setAttribute('aria-hidden','true');if(!q('.help-overlay.open'))document.body.style.overflow=''}
  function renderFaq(term=''){const list=q('#faq-list');if(!list)return;const needle=term.trim().toLowerCase();const rows=FAQS.filter(x=>!needle||(x[1]+' '+x[2]+' '+x[0]).toLowerCase().includes(needle));list.innerHTML=rows.length?rows.map((x,i)=>'<details '+(!needle&&i===0?'open':'')+'><summary><span class="faq-stage">'+x[0]+'</span>'+x[1]+'</summary><p>'+x[2]+'</p></details>').join(''):'<div class="help-empty">검색 결과가 없습니다.</div>'}
  function renderGloss(term=''){const list=q('#gloss-list');if(!list)return;const needle=term.trim().toLowerCase();const rows=Object.entries(GLOSSARY).filter(([k,v])=>!needle||(k+' '+v).toLowerCase().includes(needle));list.innerHTML=rows.length?rows.map(([k,v])=>'<div class="gloss-item"><div class="gloss-title">'+k+'</div><div class="gloss-desc">'+v+'</div></div>').join(''):'<div class="help-empty">검색 결과가 없습니다.</div>'}
  renderFaq();renderGloss();
  q('#faq-open')?.addEventListener('click',()=>openModal('#faq-overlay'));
  q('#gloss-open')?.addEventListener('click',()=>openModal('#gloss-overlay'));
  q('#guide-faq')?.addEventListener('click',()=>openModal('#faq-overlay'));
  qa('[data-close-help]').forEach(b=>b.addEventListener('click',()=>closeModal(b.closest('.help-overlay'))));
  qa('.help-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModal(o)}));
  document.addEventListener('keydown',e=>{if(e.key==='Escape')qa('.help-overlay.open').forEach(closeModal)});
  q('#faq-search')?.addEventListener('input',e=>renderFaq(e.target.value));
  q('#gloss-search')?.addEventListener('input',e=>renderGloss(e.target.value));
  const guide=q('#first-guide');
  guide?.removeAttribute('open');
  q('#guide-start')?.addEventListener('click',()=>{guide?.removeAttribute('open');q('#card-input')?.scrollIntoView({behavior:'smooth',block:'start'});setTimeout(()=>q('.model-card-input')?.focus(),500)});
  const helpTargets=[['상황허가','상황허가'],['판정 신청 품의','판정정보 없음'],['허가예외 확인','허가예외'],['사전신고','사전신고'],['의심징후 점검','의심징후'],['결과 요약 작성','결과 요약']];
  helpTargets.forEach(([text,key])=>{qa('.card h2').filter(h=>h.textContent.includes(text)).forEach(h=>{if(h.querySelector('.inline-help'))return;const b=document.createElement('button');b.type='button';b.className='inline-help';b.textContent='?';b.title=key;b.addEventListener('click',e=>{e.stopPropagation();q('#gloss-search').value=key;renderGloss(key);openModal('#gloss-overlay')});h.appendChild(b)})});
})();`;

  if(!src.includes('<base '))src=src.replace('<head>','<head><base href="'+base+'">');
  src=src.replace('</style>',extraCss+'\n</style>');
  if(src.includes(headerOld))src=src.replace(headerOld,headerNew);
  else src=src.replace('<nav class="stepper"','<div class="help-actions"><button class="help-head-btn primary-help" id="faq-open" type="button">FAQ</button><button class="help-head-btn" id="gloss-open" type="button">용어 설명</button></div><nav class="stepper"');
  src=src.replace('<div id="db-banner"></div>',introHtml+'<div id="db-banner"></div>');
  src=src.replace(/<section class="card" id="card-input">[\s\S]*?<\/section>/,modelInputHtml);
  const scriptTag='<scr'+'ipt>'+featureJs+'<\/scr'+'ipt>';
  src=src.replace('</body>',modalHtml+scriptTag+'</body>');
  document.open();document.write(src);document.close();
})();
</script>
