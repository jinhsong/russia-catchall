name: Fix suspicion line

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix malformed line
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace("eu.innerHTML=1';","eu.innerHTML='';")
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Fix suspicion override line"
          git push
