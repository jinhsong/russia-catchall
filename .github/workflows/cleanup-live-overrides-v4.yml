name: Cleanup live overrides v4

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup and install live overrides
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=re.sub(r'\n?<script>\s*/\*\s*(?:suspicion-ui-override-v1|suspicion-ui-override-v3|classify-skip-summary-v1|catchall-live-overrides-v4).*?</script>\n?','',s,flags=re.S)
          payload=''
          script=base64.b64decode(payload).decode('utf-8')
          head,sep,tail=s.rpartition('</body>')
          s=head+script+'\n'+sep+tail
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Cleanup and install live override scripts"
          git push
