name: Patch summary exception prenotification

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install encoded UX override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('<!-- ux-final-body-test -->\n','')
          s=re.sub(r'\n?<script>\s*/\* summary-exception-prenotif-v[0-9]+ \*/[\s\S]*?</script>\n?','',s)
          payload=''
          script=base64.b64decode(payload).decode('utf-8')
          if 'summary-exception-prenotif-v3' not in s:
              head,sep,tail=s.rpartition('</body>')
              s=head+script+'\n'+sep+tail
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Update summary exception and prenotification UX"
          git push
