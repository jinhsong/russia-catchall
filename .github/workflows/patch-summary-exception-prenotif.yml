name: Patch exact match preview

on:
  push:
    branches:
      - exact-match-preview
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Append exact match override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=re.sub(r'\n?<script>\s*/\* exact-model-match-choices-v[0-9]+ \*/[\s\S]*?</script>\n?','',s)
          payload=''
          script=base64.b64decode(payload).decode('utf-8')
          if 'exact-model-match-choices-v1' not in s:
              head,sep,tail=s.rpartition('</body>')
              s=head+script+'\n'+sep+tail
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Add exact model match and duplicate selection"
          git push
