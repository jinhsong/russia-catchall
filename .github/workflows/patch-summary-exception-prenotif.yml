name: Patch prenotification single party layout

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install single party layout override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=re.sub(r'\n?<script>\s*/\* prenotif-single-party-layout-v[0-9]+ \*/[\s\S]*?</script>\n?','',s)
          script=r'''
<script>
/* prenotif-single-party-layout-v2 */
(function(){
  function setPartyValue(iv,val){
    ['buyer','consignee','enduser'].forEach(function(k){var el=document.getElementById('pn-'+k+'-'+iv);if(el)el.value=val;});
    if(window.state&&state.invoices&&state.invoices[iv]){state.invoices[iv].buyer=val;state.invoices[iv].consignee=val;state.invoices[iv].endUser=val;state.invoices[iv].russiaParties=val?[val]:[];save();}
  }
  function enforceSingleParty(iv,selected){
    var checks=Array.from(document.querySelectorAll('[data-russia-party="'+iv+'"]'));
    if(selected){checks.forEach(function(x){if(x.value!==selected)x.checked=false;if(x.closest('.chk'))x.closest('.chk').classList.toggle('on',x.checked);});setPartyValue(iv,selected);return;}
    var checked=checks.filter(function(x){return x.checked;});
    if(checked.length>1)checked.slice(1).forEach(function(x){x.checked=false;});
    var val=(checks.find(function(x){return x.checked;})||{}).value||'';
    checks.forEach(function(x){if(x.closest('.chk'))x.closest('.chk').classList.toggle('on',x.checked);});
    if(val)setPartyValue(iv,val);
  }
  function applyPrenotifSinglePartyLayout(){
    document.querySelectorAll('[data-fill-russia-party]').forEach(function(btn){btn.remove();});
    document.querySelectorAll('[id^="pn-russia-parties-"]').forEach(function(box){
      var iv=box.id.replace('pn-russia-parties-','');
      var hint=box.querySelector('.hint');
      if(hint)hint.textContent='SERC 또는 SRR 중 하나만 선택할 수 있습니다. 선택 시 구매자, 최종수하인, 최종사용자에 자동 반영됩니다.';
      enforceSingleParty(iv);
    });
    document.querySelectorAll('[data-russia-party]').forEach(function(ch){
      if(ch.dataset.singlePartyBound)return;
      ch.dataset.singlePartyBound='1';
      ch.addEventListener('change',function(){var iv=ch.dataset.russiaParty;if(ch.checked)enforceSingleParty(iv,ch.value);else enforceSingleParty(iv);},true);
    });
  }
  if(!document.getElementById('prenotif-col-width-style')){
    var style=document.createElement('style');
    style.id='prenotif-col-width-style';
    style.textContent='@media(min-width:561px){#card-prenotif table.grid th:nth-child(1),#card-prenotif table.grid td:nth-child(1){width:30%;min-width:190px}#card-prenotif table.grid th:nth-child(2),#card-prenotif table.grid td:nth-child(2){width:30%;min-width:180px}#card-prenotif table.grid th:nth-child(3),#card-prenotif table.grid td:nth-child(3){width:9%;min-width:80px}#card-prenotif table.grid th:nth-child(4),#card-prenotif table.grid td:nth-child(4){width:11%;min-width:95px}#card-prenotif table.grid th:nth-child(5),#card-prenotif table.grid td:nth-child(5){width:10%;min-width:90px}#card-prenotif table.grid th:nth-child(6),#card-prenotif table.grid td:nth-child(6){width:10%;min-width:80px}#card-prenotif table.grid td:nth-child(3) input,#card-prenotif table.grid td:nth-child(4) input{padding-left:8px;padding-right:8px}}';
    document.head.appendChild(style);
  }
  var oldRenderInvoices=window.renderInvoices;
  if(typeof oldRenderInvoices==='function'&&!oldRenderInvoices.__singlePartyLayoutV2){
    var newRenderInvoices=function(){oldRenderInvoices.apply(this,arguments);applyPrenotifSinglePartyLayout();};
    newRenderInvoices.__singlePartyLayoutV2=true;
    window.renderInvoices=newRenderInvoices;
  }
  applyPrenotifSinglePartyLayout();
})();
</script>
'''
          head,sep,tail=s.rpartition('</body>')
          s=head+script+'\n'+sep+tail
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Make prenotification SERC SRR mutually exclusive"
          git push
