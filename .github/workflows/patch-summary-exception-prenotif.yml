name: Patch prenotification UI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch prenotification UI
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          old = 'type="checkbox" data-russia-party="${iv}"'
          new = 'type="radio" name="pn-russia-party-${iv}" data-russia-party="${iv}"'
          s = s.replace(old, new)
          css = '\n@media(min-width:561px){#card-prenotif table.grid th:nth-child(1),#card-prenotif table.grid td:nth-child(1){width:32%;min-width:210px}#card-prenotif table.grid th:nth-child(3),#card-prenotif table.grid td:nth-child(3){width:8%;min-width:70px}#card-prenotif table.grid th:nth-child(4),#card-prenotif table.grid td:nth-child(4){width:9%;min-width:85px}#card-prenotif [data-fill-russia-party]{display:none!important}}\n'
          if '[data-fill-russia-party]{display:none!important}' not in s:
              s = s.replace('</style>', css + '</style>', 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Update prenotification UI"
          git push
