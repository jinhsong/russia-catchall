name: Patch prenotification single party layout

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install single party layout override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=re.sub(r'\n?<script>\s*/\* prenotif-single-party-layout-v[0-9]+ \*/[\s\S]*?</script>\n?','',s)
          payload=''
          script=base64.b64decode(payload).decode('utf-8')
          head,sep,tail=s.rpartition('</body>')
          s=head+script+'\n'+sep+tail
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Make prenotification SERC SRR mutually exclusive"
          git push
