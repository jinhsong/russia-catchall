name: Patch summary exception prenotification

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install live override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('<!-- ux-patch-marker-test -->\n','')
          s=re.sub(r'\n?<script>\s*/\* summary-exception-prenotif-v[0-9]+ \*/[\s\S]*?</script>\n?','',s)
          script=r'''
<script>
/* summary-exception-prenotif-v2 */
(function(){
  function fixedCandidate(model, idx){
    var cs=(typeof candidates==='function'?candidates(model):[])||[];
    var c=cs[idx]||cs[0]||{};
    return (c.item||model||'-')+' / HS '+(c.hs||'-')+' / '+(c.source||'판정결과');
  }
  function fillRussiaParties(iv){
    var vals=Array.from(document.querySelectorAll('[data-russia-party="'+iv+'"]')).filter(function(x){return x.checked;}).map(function(x){return x.value;});
    if(!vals.length) return;
    var v=vals.join(', ');
    ['buyer','consignee','enduser'].forEach(function(k){var el=document.getElementById('pn-'+k+'-'+iv);if(el)el.value=v;});
    if(window.state&&state.invoices&&state.invoices[iv]){state.invoices[iv].buyer=v;state.invoices[iv].consignee=v;state.invoices[iv].endUser=v;state.invoices[iv].russiaParties=vals;save();}
  }
  function enhancePrenotif(){
    document.querySelectorAll('#pn-invoices table.grid').forEach(function(tbl){var th=tbl.querySelector('tr th:nth-child(2)');if(th)th.textContent='확정 품목';});
    document.querySelectorAll('[id^="pn-cand-"]').forEach(function(sel){
      if(sel.tagName!=='SELECT') return;
      var parts=sel.id.replace('pn-cand-','').split('-');
      var iv=Number(parts[0]), ii=Number(parts[1]);
      var inv=state.invoices&&state.invoices[iv];
      var item=inv&&inv.items&&inv.items[ii];
      var val=sel.value||'0';
      var box=document.createElement('div');
      box.innerHTML='<input type="hidden" id="'+sel.id+'" value="'+val+'"><div class="hint"><b>2단계 판정결과 기준</b><br>'+esc(fixedCandidate(item&&item.model,Number(val)))+'</div>';
      sel.replaceWith(box);
    });
    document.querySelectorAll('[id^="pn-russia-parties-"]').forEach(function(box){
      var iv=box.id.replace('pn-russia-parties-','');
      var hint=box.querySelector('.hint');
      if(hint)hint.textContent='SERC/SRR 선택 후 아래 버튼을 누르면 구매자, 최종수하인, 최종사용자에 모두 반영됩니다.';
      if(!box.querySelector('[data-fill-russia-party]')){
        var btn=document.createElement('button');btn.type='button';btn.className='btn sm';btn.setAttribute('data-fill-russia-party',iv);btn.textContent='구매자·최종수하인·최종사용자 자동 입력';btn.onclick=function(){fillRussiaParties(iv);};box.appendChild(btn);
      }
    });
    document.querySelectorAll('[data-russia-party]').forEach(function(ch){if(ch.dataset.fillAllBound)return;ch.dataset.fillAllBound='1';ch.addEventListener('change',function(){fillRussiaParties(ch.dataset.russiaParty);});});
  }
  var oldRenderInvoices=window.renderInvoices;
  if(typeof oldRenderInvoices==='function'&&!oldRenderInvoices.__summaryExceptionPrenotifV2){
    var newRenderInvoices=function(){oldRenderInvoices.apply(this,arguments);enhancePrenotif();};
    newRenderInvoices.__summaryExceptionPrenotifV2=true;window.renderInvoices=newRenderInvoices;
  }
  var oldBuildException=window.buildException;
  if(typeof oldBuildException==='function'&&!oldBuildException.__noneNoticeV2){
    var newBuildException=function(){oldBuildException.apply(this,arguments);var btn=document.getElementById('ex-continue');if(btn&&!btn.dataset.noneNoticeV2){var oldClick=btn.onclick;btn.dataset.noneNoticeV2='1';btn.onclick=function(){if(oldClick)oldClick.call(this);var checked=document.querySelector('input[name="ex"]:checked');if(checked&&checked.value==='none'){var el=document.getElementById('ex-result');if(el)el.innerHTML=note('danger','<b>허가예외 해당 없음</b><br>상황허가 대상입니다. 결과 요약 버튼을 눌러 점검 결과를 다운로드 하신 후 통상그룹 담당자에게 전달하여 주시기 바랍니다.');var summary=document.getElementById('ex-summary');if(summary){summary.classList.remove('ghost');summary.classList.add('final-summary');summary.textContent='결과 요약으로 이동';}}};}};
    newBuildException.__noneNoticeV2=true;window.buildException=newBuildException;
  }
  var oldReportHTML=window.reportHTML;
  if(typeof oldReportHTML==='function'&&!oldReportHTML.__summaryCleanupV2){
    var newReportHTML=function(){
      var html=oldReportHTML.apply(this,arguments);
      try{
        var doc=new DOMParser().parseFromString(html,'text/html');
        doc.querySelectorAll('h2,h3,h4').forEach(function(h){if(/최종사용자 정보|사업 분야|활용 분야/.test(h.textContent||'')){var n=h.nextSibling;while(n){var next=n.nextSibling;if(n.nodeType===1&&/^H[234]$/.test(n.tagName))break;if(n.parentNode)n.parentNode.removeChild(n);n=next;}h.remove();}});
        doc.querySelectorAll('tr').forEach(function(tr){if(/사업 분야|활용 분야/.test(tr.textContent||''))tr.remove();});
        return '<!doctype html>\n'+doc.documentElement.outerHTML;
      }catch(e){return html.replace(/<h[234][^>]*>[^<]*(최종사용자 정보|사업 분야|활용 분야)[\s\S]*?(?=<h[234]|<\/body>)/g,'');}
    };
    newReportHTML.__summaryCleanupV2=true;window.reportHTML=newReportHTML;
  }
})();
</script>
'''
          head,sep,tail=s.rpartition('</body>')
          s=head+script+'\n'+sep+tail
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Update summary exception and prenotification UX"
          git push
