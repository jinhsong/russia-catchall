name: Patch exception UI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch file
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, re
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          original = s
          options = base64.b64decode('').decode('utf-8')
          panel = base64.b64decode('PGRldGFpbHMgY2xhc3M9ImRiLXBhbmVsIj48c3VtbWFyeT7tjJDsoJUg642w7J207YSwIO2DkeyerCDsg4Htg5w8L3N1bW1hcnk+PGRpdiBjbGFzcz0iY2FyZCI+PGRpdiBpZD0iZGItc3RhdHVzIj48L2Rpdj48L2Rpdj48L2RldGFpbHM+').decode('utf-8')
          s = re.sub(r'const EXCEPTION_OPTIONS=\[.*?\];\nconst INDICATORS', options + '\nconst INDICATORS', s, count=1, flags=re.S)
          s = re.sub(r'<details class="db-panel">.*?</details><div class="footer">', panel + '<div class="footer">', s, count=1, flags=re.S)
          if s != original:
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Update exception guidance and remove DB upload inputs"
          git push
