name: Patch classify skip summary

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Append classify skip summary override
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          marker='classify-skip-summary-v1'
          payload=''
          script=base64.b64decode(payload).decode('utf-8')
          if marker not in s:
              s=s.replace('</body>',script+'\n</body>',1)
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Skip suspicion for Russia SERC SRR classify"
          git push
