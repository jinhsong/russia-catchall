name: Fix summary and prenotification UX

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch summary wording and prenotification parties
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          original = s

          replacements = {
              '7 보고서': '7 결과 요약',
              '사전신고 내용 저장 · 보고서로 이동': '사전신고 내용 저장 · 결과 요약으로 이동',
              '저장 · 보고서로 이동': '저장 · 결과 요약으로 이동',
              '보고서 작성': '결과 요약 작성',
              '처리한 작업 내용이 보고서에 반영됩니다.': '처리한 작업 내용이 결과 요약에 반영됩니다.',
              '결과 보고서(.html) 다운로드': '결과 요약(.html) 다운로드',
              '결과 보고서</button>': '결과 요약</button>',
              'id="ex-summary">보고서</button>': 'id="ex-summary">결과 요약</button>',
              '상황허가 판정 · 사전신고 점검 결과 보고서': '상황허가 판정 · 사전신고 점검 결과 요약',
              '상황허가 점검 결과 보고서': '상황허가 점검 결과 요약',
              'catchall-report-': 'catchall-summary-',
          }
          for old, new in replacements.items():
              s = s.replace(old, new)

          old_new_invoice = "function newInvoice(){return{no:'',country:'',buyer:'',endUser:'',endUse:'',items:[newLine()]}}"
          new_new_invoice = "function newInvoice(){return{no:'',country:'',buyer:'',consignee:'',endUser:'',endUse:'',russiaParties:[],items:[newLine()]}}"
          s = s.replace(old_new_invoice, new_new_invoice)

          start = s.find('function modelOptions(selected){')
          end = s.find('function syncInvoices(){', start)
          if start == -1 or end == -1:
              raise SystemExit('Could not locate invoice render block')
          new_render = r'''function modelOptions(selected){return state.preModels.map(m=>`<option value="${esc(m)}" ${m===selected?'selected':''}>${esc(m)}</option>`).join('')}function countryOptions(inv,iv){return ['러시아','벨라루스'].map(c=>`<label class="chk ${inv.country===c?'on':''}"><input type="radio" name="pn-country-${iv}" data-country-choice="${iv}" value="${c}" ${inv.country===c?'checked':''}> ${c}</label>`).join('')}function russiaPartyOptions(inv,iv){const selected=inv.russiaParties||[];return `<div id="pn-russia-parties-${iv}" class="${inv.country==='러시아'?'':'hide'}" style="margin-top:8px"><label class="fld">러시아 선택 시 선택</label>${['SERC','SRR'].map(v=>`<label class="chk ${selected.includes(v)?'on':''}"><input type="checkbox" data-russia-party="${iv}" value="${v}" ${selected.includes(v)?'checked':''}> ${v}</label>`).join('')}<div class="hint">선택하면 최종사용자 입력란에 반영됩니다. 필요 시 직접 수정할 수 있습니다.</div></div>`}function renderInvoices(){const wrap=$('#pn-invoices');wrap.innerHTML='';state.invoices.forEach((inv,iv)=>{if(!Array.isArray(inv.russiaParties))inv.russiaParties=[];wrap.insertAdjacentHTML('beforeend',`<div class="mcard"><div class="mhead"><span class="mname">인보이스 ${iv+1}</span><span class="right">${iv>0?`<button class="btn sm" data-del-inv="${iv}">인보이스 삭제</button>`:''}</span></div><div class="mbody"><div class="row"><div class="col"><label class="fld req">인보이스 번호</label><input type="text" id="pn-no-${iv}" value="${esc(inv.no)}"></div><div class="col"><label class="fld req">목적국</label><div class="chips">${countryOptions(inv,iv)}</div>${russiaPartyOptions(inv,iv)}</div></div><div class="row" style="margin-top:10px"><div class="col"><label class="fld req">구매자</label><input type="text" id="pn-buyer-${iv}" value="${esc(inv.buyer)}"></div><div class="col"><label class="fld req">최종수하인</label><input type="text" id="pn-consignee-${iv}" value="${esc(inv.consignee||'')}"></div></div><div class="row" style="margin-top:10px"><div class="col"><label class="fld req">최종사용자</label><input type="text" id="pn-enduser-${iv}" value="${esc(inv.endUser)}"></div><div class="col"><label class="fld req">최종사용용도</label><input type="text" id="pn-enduse-${iv}" value="${esc(inv.endUse)}"></div></div><div class="toolbar"><button type="button" class="btn sm" data-add-item="${iv}">품목 추가</button></div><div class="scrollx" style="margin-top:10px"><table class="grid"><tr><th>모델 선택</th><th>품목 후보</th><th>수량</th><th>단가(USD)</th><th>유무상</th><th>삭제</th></tr>${inv.items.map((it,ii)=>{if(!it.model)it.model=state.preModels[0]||'';const cs=candidates(it.model);if(it.candIdx>=cs.length)it.candIdx=0;return `<tr><td><select id="pn-model-${iv}-${ii}" data-model-row="${iv}-${ii}">${modelOptions(it.model)}</select></td><td><select id="pn-cand-${iv}-${ii}">${cs.map((c,ci)=>`<option value="${ci}" ${ci==it.candIdx?'selected':''}>${esc(c.item||c.model)} / HS ${esc(c.hs||'-')} / ${esc(c.source)}</option>`).join('')}</select></td><td><input type="number" id="pn-qty-${iv}-${ii}" value="${esc(it.qty)}"></td><td><input type="number" step="0.01" id="pn-price-${iv}-${ii}" value="${esc(it.price)}"></td><td><select id="pn-paid-${iv}-${ii}"><option ${it.paid==='유상'?'selected':''}>유상</option><option ${it.paid==='무상'?'selected':''}>무상</option></select></td><td>${inv.items.length>1?`<button type="button" class="btn sm" data-del-item="${iv}-${ii}">삭제</button>`:'-'}</td></tr>`}).join('')}</table></div></div></div>`) });bindInvoiceButtons()}function bindInvoiceButtons(){$$('[data-del-inv]').forEach(b=>b.onclick=()=>{syncInvoices();state.invoices.splice(+b.dataset.delInv,1);renderInvoices()});$$('[data-add-item]').forEach(b=>b.onclick=()=>{syncInvoices();state.invoices[+b.dataset.addItem].items.push(newLine());renderInvoices()});$$('[data-del-item]').forEach(b=>b.onclick=()=>{syncInvoices();const [iv,ii]=b.dataset.delItem.split('-').map(Number);if(state.invoices[iv].items.length>1)state.invoices[iv].items.splice(ii,1);renderInvoices()});$$('[data-model-row]').forEach(sel=>sel.onchange=()=>{syncInvoices();const [iv,ii]=sel.dataset.modelRow.split('-').map(Number);state.invoices[iv].items[ii].model=sel.value;state.invoices[iv].items[ii].candIdx=0;renderInvoices()});$$('[data-country-choice]').forEach(r=>r.onchange=()=>{syncInvoices();const iv=+r.dataset.countryChoice;state.invoices[iv].country=r.value;if(r.value!=='러시아')state.invoices[iv].russiaParties=[];renderInvoices()});$$('[data-russia-party]').forEach(ch=>ch.onchange=()=>{ch.closest('.chk').classList.toggle('on',ch.checked);const iv=+ch.dataset.russiaParty;const vals=$$(`[data-russia-party="${iv}"]`).filter(x=>x.checked).map(x=>x.value);const target=$('#pn-enduser-'+iv);const old=target.value.trim();if(vals.length&&(!old||['SERC','SRR','SERC, SRR','SRR, SERC'].includes(old)))target.value=vals.join(', ');syncInvoices()})}'''
          s = s[:start] + new_render + s[end:]

          start = s.find('function syncInvoices(){')
          end = s.find('function buildScreen(){', start)
          if start == -1 or end == -1:
              raise SystemExit('Could not locate invoice sync block')
          new_sync = r'''function syncInvoices(){state.invoices.forEach((inv,iv)=>{inv.no=$('#pn-no-'+iv)?.value.trim()||'';inv.country=$(`input[name="pn-country-${iv}"]:checked`)?.value||'';inv.russiaParties=$$(`[data-russia-party="${iv}"]`).filter(x=>x.checked).map(x=>x.value);inv.buyer=$('#pn-buyer-'+iv)?.value.trim()||'';inv.consignee=$('#pn-consignee-'+iv)?.value.trim()||'';inv.endUser=$('#pn-enduser-'+iv)?.value.trim()||'';inv.endUse=$('#pn-enduse-'+iv)?.value.trim()||'';inv.items.forEach((it,ii)=>{it.model=$('#pn-model-'+iv+'-'+ii)?.value||it.model||state.preModels[0]||'';it.candIdx=+($('#pn-cand-'+iv+'-'+ii)?.value||0);it.qty=$('#pn-qty-'+iv+'-'+ii)?.value||'';it.price=$('#pn-price-'+iv+'-'+ii)?.value||'';it.paid=$('#pn-paid-'+iv+'-'+ii)?.value||'유상'})})}$('#btn-add-invoice').onclick=()=>{syncInvoices();state.invoices.push(newInvoice());renderInvoices()};$('#btn-prenotif-save').onclick=()=>{syncInvoices();const errs=[];state.invoices.forEach((inv,i)=>{if(!inv.no)errs.push(`인보이스 ${i+1}: 번호`);if(!inv.country)errs.push(`인보이스 ${i+1}: 목적국`);if(!inv.buyer)errs.push(`인보이스 ${i+1}: 구매자`);if(!inv.consignee)errs.push(`인보이스 ${i+1}: 최종수하인`);if(!inv.endUser)errs.push(`인보이스 ${i+1}: 최종사용자`);if(!inv.endUse)errs.push(`인보이스 ${i+1}: 최종사용용도`);if(!inv.items.length)errs.push(`인보이스 ${i+1}: 품목 1개 이상`);inv.items.forEach((it,ii)=>{if(!it.model)errs.push(`인보이스 ${i+1} 품목 ${ii+1}: 모델 선택`);if(!it.qty)errs.push(`${it.model||'품목'}: 수량`);if(!it.price)errs.push(`${it.model||'품목'}: 단가`)})});if(errs.length){$('#pn-err').innerHTML=note('danger','입력을 확인하세요.<ul>'+errs.map(e=>`<li>${esc(e)}</li>`).join('')+'</ul>');return}state.preDone=true;save();buildSummary();show('#card-summary')};'''
          s = s[:start] + new_sync + s[end:]

          s = s.replace("function buildSummary(){save();$('#summary-body').innerHTML=note('ok',`보고서가 준비되었습니다. 생성일: ${today()} · 모델 ${state.models.length}개`)}",
                        "function buildSummary(){save();$('#summary-body').innerHTML=note('warn',`<b>본 결과 요약을 다운로드 후 품의에 첨부해주시기 바랍니다.</b><br>결과 요약이 준비되었습니다. 생성일: ${today()} · 모델 ${state.models.length}개`)}")

          s = s.replace("<tr><th>목적국</th><td>${esc(inv.country)}</td><th>구매자</th><td>${esc(inv.buyer)}</td></tr><tr><th>최종사용자</th><td>${esc(inv.endUser)}</td><th>최종사용용도</th><td>${esc(inv.endUse)}</td></tr>",
                        "<tr><th>목적국</th><td>${esc(inv.country)}</td><th>구매자</th><td>${esc(inv.buyer)}</td></tr><tr><th>최종수하인</th><td>${esc(inv.consignee||'-')}</td><th>최종사용자</th><td>${esc(inv.endUser)}</td></tr><tr><th>최종사용용도</th><td colspan=\"3\">${esc(inv.endUse)}</td></tr>")

          if s != original:
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Rename report to summary and update prenotification parties"
          git push
