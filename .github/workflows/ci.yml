name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run smoke test
        run: npm test
