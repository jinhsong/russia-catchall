name: Fix indicator tristate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make indicator answers explicit
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          original=s
          s=s.replace("      var yes=!!state.indicators[i];", "      var hasAnswer=!!state.screened&&state.indicators&&state.indicators.length>i;\n      var yes=hasAnswer&&state.indicators[i]===true;\n      var no=hasAnswer&&state.indicators[i]===false;")
          s=s.replace("+(yes?'':'on')+", "+(no?'on':'')+")
          s=s.replace("+(yes?'':'checked')+", "+(no?'checked':'')+")
          s=s.replace("        state.indicators=currentIndicators().map(function(_,i){", "        var missing=[];\n        state.indicators=currentIndicators().map(function(o,i){")
          s=s.replace("          return v&&v.value==='yes';\n        });\n        state.screened=true;", "          if(!v)missing.push(o.no);\n          return v&&v.value==='yes';\n        });\n        if(missing.length){alert('의심징후 항목의 예/아니오를 모두 선택하세요. 미선택: '+missing.join(', '));return}\n        state.screened=true;")
          if s!=original:
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Require explicit suspicion answers"
          git push
