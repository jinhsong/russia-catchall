name: Fix classify UX

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch classification UX
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          changed = False

          css = """\n#form-title.docedit{display:block;width:100%;min-height:48px;border:1px solid var(--line2);border-radius:10px;background:#fff;color:var(--ink);padding:12px 14px;font-family:Pretendard,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:14px;line-height:1.6;white-space:normal}\n"""
          if '#form-title.docedit' not in s:
              s = s.replace('</style>', css + '</style>', 1)
              changed = True

          marker = "const PURPOSE_OPTIONS="
          if marker not in s:
              needle = "const INDICATORS=['수입자가 해당 물품등의 최종용도에 관하여 필요한 정보 제공을 기피하는 경우','해당 물품등이 최종사용자의 사업 분야에 활용되지 아니하는 경우','해당 물품등이 수입국의 기술수준과 현저한 격차가 있는 경우','최종사용자가 해당 물품등이 활용될 분야의 사업 경력이 없는 경우','최종사용자가 해당 물품등에 대한 전문적 지식이 없으면서도 그 물품등의 수출을 요구하는 경우','최종사용자가 해당 물품등에 대한 설치·보수 또는 교육훈련 서비스를 거부하는 경우','해당 물품등의 최종수하인이 운송업자인 경우','해당 물품등에 대한 가격조건이나 지불조건이 통상적인 범위를 벗어나는 경우','해당 물품등의 납기일이 통상적인 기간을 벗어난 경우','해당 물품등의 수송경로가 통상적인 경로를 벗어난 경우','해당 물품등의 수입국 내 사용 또는 재수출 여부가 명백하지 아니한 경우','해당 물품등에 대한 정보나 목적지 등에 대하여 통상적인 범위를 벗어나는 보안을 요구하는 경우'];"
              repl = needle + "\nconst PURPOSE_OPTIONS=['삼성전자의 전액 출자 자회사인 연구소(SRR), 법인(SERC)에 한정하여 사용','EAEU 회원국 신제품 EAC 규격 취득용'];"
              if needle in s:
                  s = s.replace(needle, repl, 1)
                  changed = True

          if 'function normalizeWeight' not in s:
              insert = "function normalizeWeight(v){v=String(v||'').trim().replace(/\\s+/g,'');if(!v)return'';if(/^\\d+(?:\\.\\d+)?$/i.test(v))return v+'g';if(/^\\d+(?:\\.\\d+)?kg$/i.test(v))return v.replace(/kg$/i,'kg');if(/^\\d+(?:\\.\\d+)?g$/i.test(v))return v.replace(/g$/i,'g');return v}"
              s = s.replace('function buildClassify(){', insert + 'function buildClassify(){', 1)
              changed = True

          old = "const o=state.classify[L.model]||{};body.insertAdjacentHTML('beforeend'"
          new = "const o=state.classify[L.model]||{};const purposeValue=o.purpose||'';const purposePreset=PURPOSE_OPTIONS.includes(purposeValue)?purposeValue:'';body.insertAdjacentHTML('beforeend'"
          if old in s:
              s = s.replace(old, new, 1)
              changed = True

          replacements = {
              '<label class="fld req">무게</label><input type="text" id="cl-weight-${idx}" placeholder="예) 230g 또는 0.23kg" value="${esc(o.weight||\'\')}">': '<label class="fld req">무게</label><input type="text" id="cl-weight-${idx}" inputmode="decimal" placeholder="예) 230g 또는 0.23kg" value="${esc(normalizeWeight(o.weight||\'\'))}">',
              '<label class="fld req" style="margin-top:12px">용도</label><input type="text" id="cl-purpose-${idx}" placeholder="예) 일반 소비자 판매용, 업무용 테스트, 수리 후 재수출 등" value="${esc(o.purpose||\'\')}">': '<label class="fld req" style="margin-top:12px">용도</label><select id="cl-purpose-select-${idx}"><option value="">용도 선택</option>${PURPOSE_OPTIONS.map(v=>`<option value="${esc(v)}" ${v===purposePreset?\'selected\':\'\'}>${esc(v)}</option>`).join(\'\')}<option value="__direct" ${purposeValue&&!purposePreset?\'selected\':\'\'}>직접 입력</option></select><input type="text" id="cl-purpose-${idx}" placeholder="직접 입력 또는 선택값 보완" value="${esc(purposeValue)}" style="margin-top:8px">',
              "$('#cl-hs-'+idx).addEventListener('input',e=>{e.target.value=e.target.value.replace(/[^0-9]/g,'').slice(0,10);e.target.dataset.src='직접입력';markHs(idx)});recommend(idx);markHs(idx)});": "$('#cl-hs-'+idx).addEventListener('input',e=>{e.target.value=e.target.value.replace(/[^0-9]/g,'').slice(0,10);e.target.dataset.src='직접입력';markHs(idx)});$('#cl-weight-'+idx).addEventListener('blur',e=>{e.target.value=normalizeWeight(e.target.value)});$('#cl-purpose-select-'+idx)?.addEventListener('change',e=>{const input=$('#cl-purpose-'+idx);if(e.target.value==='__direct'){input.focus();return}if(e.target.value)input.value=e.target.value});recommend(idx);markHs(idx)});",
              "weight:$('#cl-weight-'+idx).value.trim()": "weight:normalizeWeight($('#cl-weight-'+idx).value.trim())",
              "if(!o.weight){addErr($('#cl-weight-'+idx),'무게 입력');errs.push(`[${L.model}] 무게`)}if(!o.purpose)": "if(!o.weight){addErr($('#cl-weight-'+idx),'무게 입력');errs.push(`[${L.model}] 무게`)}else if(!/(?:g|kg)$/i.test(o.weight)){addErr($('#cl-weight-'+idx),'g 또는 kg 단위로 입력');errs.push(`[${L.model}] 무게 단위`)}if(!o.purpose)",
              "<h4>3. 첨부</h4><ul>${items.map((it,i)=>`<li>첨부 ${i+1}. ${i+1}번 품목 ${esc(it.model)} 사양서 파일</li>`).join('')}</ul>": "<h4>3. 첨부</h4><ul>${items.map((it,i)=>`<li>첨부 ${i+1}. ${i+1}번 ${esc(it.model)} 사양서</li>`).join('')}<li>첨부 ${items.length+1}. 결과 요약</li></ul>",
              "<li>아래 제목과 본문을 복사하여 사용하시기 바랍니다.</li><li>사양서는 품의 내 별도 첨부해주시기 바랍니다.</li>": "<li>아래 제목과 본문을 복사하여 사용하시기 바랍니다.</li><li>본문 하단의 결과 요약 버튼을 눌러 결과 요약을 진행, 그 결과를 다운로드 후 품의에 첨부해주시기 바랍니다.</li><li>사양서는 품의 내 별도 첨부해주시기 바랍니다.</li>",
              "btns.push('<button class=\"btn ghost\" id=\"cl-summary\">보고서</button>');": "btns.push('<button class=\"btn ghost\" id=\"cl-summary\">결과 요약</button>');",
          }

          for old_text, new_text in replacements.items():
              if old_text in s:
                  s = s.replace(old_text, new_text, 1)
                  changed = True

          if changed:
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Improve classification request UX"
          git push
