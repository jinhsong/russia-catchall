name: Fix final summary button

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch prenotification single party layout
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=re.sub(r'\n?<script>\s*/\* prenotif-single-party-layout-v[0-9]+ \*/[\s\S]*?</script>\n?','',s)
          payload='또는 SRR 중 하나만 선택할 수 있습니다. 선택 시 구매자, 최종수하인, 최종사용자에 자동 반영됩니다.';
      enforceSingleParty(iv);
    });
    document.querySelectorAll('[data-russia-party]').forEach(function(ch){
      if(ch.dataset.singlePartyBoundV4) return;
      ch.dataset.singlePartyBoundV4='1';
      ch.addEventListener('change',function(){
        var iv=ch.dataset.russiaParty;
        if(ch.checked) enforceSingleParty(iv,ch.value);
        else enforceSingleParty(iv);
      },true);
    });
  }
  if(!document.getElementById('prenotif-col-width-style-v4')){
    var style=document.createElement('style');
    style.id='prenotif-col-width-style-v4';
    style.textContent='@media(min-width:561px){#card-prenotif table.grid th:nth-child(1),#card-prenotif table.grid td:nth-child(1){width:32%;min-width:210px}#card-prenotif table.grid th:nth-child(2),#card-prenotif table.grid td:nth-child(2){width:29%;min-width:180px}#card-prenotif table.grid th:nth-child(3),#card-prenotif table.grid td:nth-child(3){width:8%;min-width:70px}#card-prenotif table.grid th:nth-child(4),#card-prenotif table.grid td:nth-child(4){width:9%;min-width:85px}#card-prenotif table.grid th:nth-child(5),#card-prenotif table.grid td:nth-child(5){width:10%;min-width:85px}#card-prenotif table.grid th:nth-child(6),#card-prenotif table.grid td:nth-child(6){width:8%;min-width:70px}#card-prenotif table.grid td:nth-child(3) input,#card-prenotif table.grid td:nth-child(4) input{padding-left:7px;padding-right:7px}}';
    document.head.appendChild(style);
  }
  var oldRenderInvoices=window.renderInvoices;
  if(typeof oldRenderInvoices==='function'&&!oldRenderInvoices.__singlePartyLayoutV4){
    var wrapped=function(){
      oldRenderInvoices.apply(this,arguments);
      applyPrenotifSinglePartyLayout();
    };
    wrapped.__singlePartyLayoutV4=true;
    window.renderInvoices=wrapped;
  }
  applyPrenotifSinglePartyLayout();
})();
</script>
'
          script=base64.b64decode(payload).decode('utf-8')
          head,sep,tail=s.rpartition('</body>')
          s=head+script+'\n'+sep+tail
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Apply prenotification single-party layout"
          git push
